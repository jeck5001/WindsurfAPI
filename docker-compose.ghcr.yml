services:
  windsurf-api:
    image: ${IMAGE_NAME:-ghcr.io/CHANGE_ME/windsurf-api}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    ports:
      - "${PORT:-3003}:3003"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      PORT: 3003
      DATA_DIR: /data
      LS_BINARY_PATH: /opt/windsurf/language_server_linux_x64
      REPLICA_ISOLATE: 1
    expose:
      - "3003"
    volumes:
      - ${APP_DATA_DIR:-./.docker-data/data}:/data
      - ${WINDSURF_DIR:-./.docker-data/opt/windsurf}:/opt/windsurf
      - ${WORKSPACE_DIR:-./.docker-data/tmp/windsurf-workspace}:/tmp/windsurf-workspace
